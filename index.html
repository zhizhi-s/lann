<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>FastFood LinkTree | Responsive Full Screen</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(circle at 10% 30%, #0f0c08, #1a1308);
            background-attachment: fixed;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* بەرهەمەکانی Fast Food لە پشتەوە */
        .bg-bite {
            position: fixed;
            font-size: 12rem;
            opacity: 0.08;
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }
        .bg-item-1 { bottom: 0; left: -50px; transform: rotate(-15deg); }
        .bg-item-2 { top: 5%; right: -30px; transform: rotate(10deg); font-size: 10rem; }
        .bg-item-3 { bottom: 20%; right: 15%; opacity: 0.06; font-size: 8rem; }

        /* کانتینەری سەرەکی - شووشەیی */
        .glass-card {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: rgba(22, 18, 14, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 100, 0, 0.1) inset;
            padding: 1.8rem 1.5rem 2rem;
            transition: all 0.2s ease;
            z-index: 2;
        }

        /* هێدەر */
        .hero {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .avatar-burger {
            width: 85px;
            height: 85px;
            margin: 0 auto 0.8rem;
            border-radius: 30px;
            background: #2a1f12;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.5), 0 0 0 3px #ffcd7e, 0 0 0 6px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: 0.2s;
        }
        .avatar-burger:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #ff8800;
        }
        .avatar-burger img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        h1 {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFA01E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .delivery-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            margin-top: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #ffcf8a;
            border: 0.5px solid #ffa447;
            flex-wrap: wrap;
            justify-content: center;
        }
        .delivery-badge i { font-size: 0.8rem; }

        /* ========== دوو دوگمەی نوێ بۆ شوێنەکان ========== */
        .branches-row {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .branch-card {
            flex: 1;
            min-width: 160px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 170, 70, 0.6);
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
        }
        .branch-card:hover {
            transform: translateY(-5px);
            border-color: #ffbb55;
            box-shadow: 0 18px 28px -8px black;
        }
        .branch-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0.8rem;
            text-align: center;
            gap: 8px;
        }
        .branch-icon {
            font-size: 2.2rem;
            background: rgba(255, 200, 100, 0.15);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            transition: 0.2s;
        }
        .branch-card:hover .branch-icon {
            background: rgba(255, 160, 30, 0.4);
            transform: scale(1.02);
        }
        .branch-title {
            font-weight: 700;
            font-size: 1rem;
            color: #ffdfaa;
            letter-spacing: 0.3px;
        }
        .branch-address {
            font-size: 0.7rem;
            color: #dbb87a;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .branch-arrow {
            color: #ffaa44;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        .branch-card:hover .branch-arrow {
            transform: translateX(4px);
        }
        /* جیاوازی ڕەنگ بۆ هەر دوگمەیەک */
        .branch-university {
            border-top: 3px solid #4caf50;
        }
        .branch-university .branch-icon {
            color: #8bc34a;
        }
        .branch-park {
            border-top: 3px solid #ff9800;
        }
        .branch-park .branch-icon {
            color: #ffb74d;
        }
        /* ================================= */

        /* لینک کارتەکانی خوارەوە (سۆشیال میدیا) */
        .link-item { margin-bottom: 0.9rem; }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 8, 5, 0.7);
            backdrop-filter: blur(5px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            text-decoration: none;
            border: 1px solid rgba(255, 140, 0, 0.4);
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .link-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }
        .platform-icon-img {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            object-fit: cover;
            background: #1f1a12;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .platform-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fae6c2;
        }
        .link-btn .arrow-icon { color: #ffaa44; font-size: 1.3rem; transition: transform 0.2s ease; }
        
        /* hover effects for socials */
        .link-tiktok:hover { border-color: #00f2ea; box-shadow: 0 0 12px rgba(0, 242, 234, 0.4); background: #11100c; }
        .link-instagram:hover { border-color: #fccc7a; box-shadow: 0 0 12px #f56040; background: linear-gradient(120deg, #2a1e2c, #1f1822);}
        .link-facebook:hover { border-color: #3b82f6; box-shadow: 0 0 12px #1877f2; background: #10131c; }
        .link-snapchat:hover { border-color: #fffc00; box-shadow: 0 0 12px #fffb00; background: #2a2a0e; }
        .link-snapchat:hover .platform-name { color: #fffbbe; }
        .link-btn:hover .arrow-icon { transform: translateX(6px); }
        .link-btn:active { transform: scale(0.97); }

        /* پرۆمۆ کۆد */
        .promo-card {
            background: linear-gradient(115deg, #2d2418, #1f1910);
            margin: 1rem 0 0.8rem;
            border-radius: 1.8rem;
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #ffbb55;
            box-shadow: 0 4px 0 #6b3f00;
        }
        .promo-text { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #ffe5b4; font-size: 0.85rem; }
        .promo-text i { font-size: 1.4rem; }
        .code { background: #000000aa; backdrop-filter: blur(8px); padding: 5px 15px; border-radius: 50px; font-family: monospace; font-weight: bold; font-size: 1rem; letter-spacing: 1px; color: #ffcd7e; border: 1px solid #ffaa33; }
        .small-cta { font-size: 0.65rem; color: #ccaa77; text-align: center; margin-top: 5px; }
        .footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.65rem; color: #b2894b; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }

        /* Responsive */
        @media (max-width: 450px) {
            body { padding: 0.8rem; }
            .glass-card { padding: 1.2rem 1rem 1.5rem; border-radius: 2rem; }
            .avatar-burger { width: 70px; height: 70px; border-radius: 25px; }
            .platform-icon-img { width: 28px; height: 28px; border-radius: 8px; }
            .platform-name { font-size: 0.95rem; }
            .link-btn { padding: 0.5rem 1rem; }
            .branches-row { gap: 0.7rem; }
            .branch-inner { padding: 0.8rem 0.5rem; }
            .branch-icon { width: 45px; height: 45px; font-size: 1.8rem; }
            .branch-title { font-size: 0.85rem; }
        }

        @media (min-height: 800px) {
            .glass-card { margin: 1rem auto; }
        }

        /* animation */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .glass-card { animation: fadeSlide 0.5s ease-out; }
        .hero { opacity: 0; animation: fadeSlide 0.3s forwards; }
        .branches-row { opacity: 0; animation: fadeSlide 0.4s forwards; animation-delay: 0.1s; }
        .link-item { opacity: 0; animation: fadeSlide 0.3s forwards; }
        .link-item:nth-child(1) { animation-delay: 0.2s; }
        .link-item:nth-child(2) { animation-delay: 0.25s; }
        .link-item:nth-child(3) { animation-delay: 0.3s; }
        .link-item:nth-child(4) { animation-delay: 0.35s; }
    </style>
</head>
<body>

<div class="bg-bite bg-item-1">🍔</div>
<div class="bg-bite bg-item-2">🍟</div>
<div class="bg-bite bg-item-3">🥤</div>

<div class="glass-card">
    <div class="hero">
        <div class="avatar-burger">
            <img src="https://i.ibb.co/Kjnhk4xK/file-00000000f9987243bd6be0b8b9ee667b.jpg" alt="Fast Food Logo">
        </div>
        <h1>ICE POP</h1>
        <div class="delivery-badge">
            <i class="fas fa-motorcycle"></i> <span>Fast Delivery • 15-20 دەقیقە</span> <i class="fas fa-bolt"></i>
        </div>
    </div>

    <!-- دوو دوگمەی جوان بۆ شوێنەکان (لقی یەکەم و لقی دووەم) -->
    <div class="branches-row">
        <!-- لقی یەکەم: زانکۆ -->
        <a href="https://maps.app.goo.gl/S3P37ZqbPJdRzqGE7" target="_blank" rel="noopener" class="branch-card branch-university">
            <div class="branch-inner">
                <div class="branch-icon">
                    <i class="fas fa-university"></i>
                </div>
                <div class="branch-title">لقی یەکەم • زانکۆ</div>
                <div class="branch-address">
                    <i class="fas fa-map-pin"></i> <span>پیشاندان لە گووگڵ مەیپ</span>
                    <i class="fas fa-arrow-right branch-arrow"></i>
                </div>
            </div>
        </a>

        <!-- لقی دووەم: 32 پاڕک -->
        <a href="https://maps.app.goo.gl/GmEcootTVRKEzM4f7" target="_blank" rel="noopener" class="branch-card branch-park">
            <div class="branch-inner">
                <div class="branch-icon">
                    <i class="fas fa-tree"></i>
                </div>
                <div class="branch-title">لقی دووەم • 32 پاڕک</div>
                <div class="branch-address">
                    <i class="fas fa-map-pin"></i> <span>پیشاندان لە گووگڵ مەیپ</span>
                    <i class="fas fa-arrow-right branch-arrow"></i>
                </div>
            </div>
        </a>
    </div>

    <!-- TikTok -->
    <div class="link-item">
        <a href="https://www.tiktok.com/@icepopfood?_r=1&_t=ZS-97ExUuL4D2d" target="_blank" rel="noopener" class="link-btn link-tiktok">
            <div class="link-left">
                <img class="platform-icon-img" src="https://i.ibb.co/Dfv88rsj/images-1.jpg" alt="TikTok Logo">
                <span class="platform-name">TikTok</span>
            </div>
            <i class="fas fa-arrow-right arrow-icon"></i>
        </a>
    </div>

    <!-- Instagram -->
    <div class="link-item">
        <a href="https://www.instagram.com/icepop32park?igsh=MWhpY3cxcHV4bnMydA==" target="_blank" rel="noopener" class="link-btn link-instagram">
            <div class="link-left">
                <img class="platform-icon-img" src="https://i.ibb.co/mFDkzqBr/file-00000000f9987243bd6be0b8b9ee667b.jpg" alt="Instagram Logo">
                <span class="platform-name">Instagram</span>
            </div>
            <i class="fas fa-arrow-right arrow-icon"></i>
        </a>
    </div>

    <!-- Facebook -->
    <div class="link-item">
        <a href="https://www.facebook.com/share/18EJgpJgZr/" target="_blank" rel="noopener" class="link-btn link-facebook">
            <div class="link-left">
                <img class="platform-icon-img" src="https://i.ibb.co/d0mw3fxH/facebook-new-logo-change-designboom-02-1.jpg" alt="Facebook Logo">
                <span class="platform-name">Facebook</span>
            </div>
            <i class="fas fa-arrow-right arrow-icon"></i>
        </a>
    </div>

    <!-- Snapchat -->
    <div class="link-item">
        <a href="https://www.snapchat.com/add/icepop32.park?share_id=5lB9KafctL0&locale=en-US" target="_blank" rel="noopener" class="link-btn link-snapchat">
            <div class="link-left">
                <img class="platform-icon-img" src="https://i.ibb.co/k23XzmGP/file-00000000f9987243bd6be0b8b9ee667b.jpg" alt="Snapchat Logo">
                <span class="platform-name">Snapchat</span>
            </div>
            <i class="fas fa-arrow-right arrow-icon"></i>
        </a>
    </div>

    <div class="promo-card">
        <div class="promo-text"><i class="fas fa-ticket-alt"></i><span>کۆدی دابەزین</span></div>
        <div class="code">none</div>
    </div>
    <div class="small-cta"><i class="fas fa-clock"></i> ئایس پۆپ هەڵژێرە</div>

    <div class="footer-note">
        <span><i class="fas fa-map-marker-alt"></i> هەولێر / زانکۆ و 32 پاڕک</span>
        <span><i class="fas fa-hashtag"></i> #FastLinkTree</span>
    </div>
</div>

<script>
    console.log("✅ دوو دوگمە بە شێوەی کارتی هاوشێوە و یەک سایز دروستکرا: لقی یەکەم (زانکۆ) و لقی دووەم (32 پاڕک)");
</script>
</body>
</html>
